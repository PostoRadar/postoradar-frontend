server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: react-router-dom usa createBrowserRouter (histórico do navegador),
    # então qualquer rota sem arquivo correspondente cai no index.html.
    location / {
        try_files $uri /index.html;
    }
}
